services:
  postgres-pgvector:
    image: pgvector/pgvector:pg17
    container_name: projectnetia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ProjectNetIaDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - projectnetia-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ProjectNetIaDb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  projectnetia-postgres-data:
